<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>系统登录</title>
  <style>
    :root {
      --bg-1: #eaf2fb;
      --bg-2: #f8fbff;
      --card: #ffffff;
      --line: #d7e3f1;
      --text: #17293a;
      --muted: #627b92;
      --brand: #0e5b97;
      --err-bg: #fff2f2;
      --err-line: #efc7c7;
      --err-text: #a12626;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(900px 500px at 90% -10%, #dbe9f9 0%, transparent 60%),
        radial-gradient(700px 420px at -10% 110%, #e3eefc 0%, transparent 60%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      font-family: "Segoe UI", "PingFang SC", sans-serif;
      color: var(--text);
      padding: 18px;
    }
    .box {
      width: min(440px, 96vw);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 18px 45px rgba(16, 53, 83, 0.12);
      padding: 24px;
    }
    .title { margin: 0 0 6px; font-size: 24px; letter-spacing: 0.3px; }
    .sub { margin: 0 0 18px; color: var(--muted); font-size: 14px; }
    label { display: block; margin: 0 0 12px; color: var(--muted); font-size: 12px; }
    input {
      width: 100%;
      margin-top: 4px;
      padding: 11px 12px;
      border: 1px solid #c8d9ea;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus {
      border-color: #7aa9d4;
      box-shadow: 0 0 0 3px rgba(17, 94, 157, 0.12);
    }
    .btn {
      width: 100%;
      padding: 11px 12px;
      border: 0;
      border-radius: 10px;
      background: linear-gradient(180deg, #1568aa, var(--brand));
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .hint { margin: 0 0 14px; color: var(--muted); font-size: 13px; }
    .err {
      margin: 0 0 12px;
      padding: 8px 10px;
      border: 1px solid var(--err-line);
      border-radius: 10px;
      color: var(--err-text);
      background: var(--err-bg);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <form class="box" method="post" action="/login">
    <h1 class="title">璨宇仓储系统</h1>
    <p class="sub">国际仓储与拼柜管理平台</p>
    <p class="hint">默认管理员：<code>admin / admin123</code></p>
    {% if error %}<p class="err">{{ error }}</p>{% endif %}
    <label>用户名
      <input name="username" placeholder="请输入用户名" value="admin" required>
    </label>
    <label>密码
      <input name="password" placeholder="请输入密码" type="password" required>
    </label>
    <button class="btn" type="submit">登录并进入系统</button>
  </form>
</body>
</html>
